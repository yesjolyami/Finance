limit_conn_zone $binary_remote_addr zone=finance_connections:10m;
limit_req_zone $binary_remote_addr zone=finance_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=finance_import:10m rate=2r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name __FINANCE_DOMAIN__;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://__FINANCE_DOMAIN__$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __FINANCE_DOMAIN__;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/__FINANCE_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__FINANCE_DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:finance_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /opt/finance/current/frontend;
    index index.html;
    autoindex off;

    client_header_timeout 10s;
    client_body_timeout 130s;
    keepalive_timeout 30s;
    send_timeout 130s;
    large_client_header_buffers 4 16k;
    client_max_body_size 1m;
    limit_conn finance_connections 20;
    limit_conn_status 429;
    limit_req_status 429;

    include /etc/nginx/snippets/finance-security-headers.conf;

    location = /index.html {
        include /etc/nginx/snippets/finance-security-headers.conf;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location = /50x.html {
        internal;
        include /etc/nginx/snippets/finance-security-headers.conf;
        add_header Cache-Control "no-store" always;
    }

    location /assets/ {
        try_files $uri =404;
        include /etc/nginx/snippets/finance-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~ ^/api/v1/households/[^/]+/imports/backup-v5/(preview|confirm)$ {
        limit_req zone=finance_import burst=2 nodelay;
        client_max_body_size 32m;
        include /etc/nginx/snippets/finance-security-headers.conf;
        add_header Cache-Control "no-store" always;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 130s;
        proxy_send_timeout 130s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Host "";
        proxy_set_header X-Forwarded-Port "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Real-IP "";
        proxy_pass http://127.0.0.1:8080;
    }

    location /api/ {
        limit_req zone=finance_api burst=30 nodelay;
        include /etc/nginx/snippets/finance-security-headers.conf;
        add_header Cache-Control "no-store" always;
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 130s;
        proxy_send_timeout 130s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Host "";
        proxy_set_header X-Forwarded-Port "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header X-Real-IP "";
        proxy_pass http://127.0.0.1:8080;
    }

    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/finance-security-headers.conf;
        add_header Cache-Control "no-store" always;
    }

    error_page 500 502 503 504 /50x.html;
}
